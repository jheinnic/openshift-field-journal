kind: List
apiVersion: v1

apiVersion: "autoscaling.openshift.io/v1"
kind: "ClusterAutoscaler"
metadata:
  name: "default"
spec:
  podPriorityThreshold: -10 
  resourceLimits:
    maxNodesTotal: 8 
    cores:
      min: 12
      max: 32 
    memory:
      min: 8 
      max: 64 
    gpus:
      - type: nvidia.com/gpu 
        min: 0 
        max: 1 
      - type: amd.com/gpu 
        min: 0 
        max: 1 
  scaleDown: 
    enabled: true 
    delayAfterAdd: 15m 
    delayAfterDelete: 4m 
    delayAfterFailure: 40s 
    unneededTime: 60s 

---

apiVersion: "autoscaling.openshift.io/v1beta1"
kind: "MachineAutoscaler"
metadata:
  name: "lab-5db7v-worker-us-east-2b"
  namespace: "openshift-machine-api"
spec:
  minReplicas: 2
  maxReplicas: 5 
  scaleTargetRef: 
    apiVersion: machine.openshift.io/v1beta1
    kind: MachineSet 
    name: lab-5db7v-worker-us-east-2b
