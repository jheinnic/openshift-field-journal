  triggers:
    - type: ConfigChange
    - type: ImageChange
      imageChange:
        from:
          kind: ImageStreamTag
          name: 'python:3.8'
    - type: GitHub
      github:
        secretReference:
          name: jupyter-notebook-webhook
  runPolicy: Serial
  output:
    to:
